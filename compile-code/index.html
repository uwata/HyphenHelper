<!DOCTYPE html>
<html>
<head>
    <style>
        body { padding: 15px; color: white; font-family: sans-serif; }
        .result { margin-top: 15px; font-weight: bold; font-size: 1.2em; color: #52a3ff; }
        sp-textfield { width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <sp-heading level="2">Hyphen Helper</sp-heading>
    <sp-body>Enter a word to see its syllable breaks:</sp-body>
    
    <sp-textfield id="wordInput" placeholder="Type a word here..."></sp-textfield>
    <sp-button id="checkBtn" variant="cta">Find Hyphens</sp-button>
    
    <div class="result" id="resultOutput"></div>

    <script src="dist/bundle.js"></script>
</body>
</html>
